# Object presets for move_to_object, z_level_object, protocols.
# Single source of truth: yolo_class, shape (physical size + pick location), confidence, pick_type.
#
# default_confidence: global YOLO conf threshold. Per-object confidence overrides.
# Per object:
#   shape: physical size for 3D estimation; location = where to move to (center, tl, tr, bl, br).
#     circle: diameter (mm).  square: side (mm).  rect: width, height (mm).
#   yolo_class: YOLO class name (must match dataset.yaml names).
#   confidence: optional; YOLO conf threshold for this class (e.g. 0.01 for faint markers).
#   pick_type: optional; which detection to pick: toolhead_close, camera_center, largest, tl, tr, bl, br, highest_confidence, ranked.

default_confidence: 0.2

50ml eppendorf:
  shape:
    type: circle
    diameter: 33
    location: center
  yolo_class: "50Ml eppendorf cap"
  pick_type: toolhead_close

50ml eppendorf cap top:
  shape:
    type: circle
    diameter: 33
    location: center
  yolo_class:
    - "50Ml eppendorf cap top"
    - "50Ml eppendorf orange cap top"
    - "50Ml eppendorf blue cap top"
  pick_type: toolhead_close

50ml eppendorf orange cap top:
  shape:
    type: circle
    diameter: 33
    location: center
  yolo_class: "50Ml eppendorf orange cap top"
  pick_type: toolhead_close

50ml eppendorf blue cap top:
  shape:
    type: circle
    diameter: 33
    location: center
  yolo_class: "50Ml eppendorf blue cap top"
  pick_type: toolhead_close

50ml eppendorf orange cap:
  shape:
    type: circle
    diameter: 33
    location: center
  yolo_class: "50Ml eppendorf orange cap"
  pick_type: toolhead_close

50ml eppendorf blue cap:
  shape:
    type: circle
    diameter: 33
    location: center
  yolo_class: "50Ml eppendorf blue cap"
  pick_type: toolhead_close

vortex genie hole:
  shape:
    type: circle
    diameter: 50
    location: center
  yolo_class: "Vortex Genie Hole"
  confidence: 0.1
  pick_type: ranked  # pick the largest area / highest confidence detection (by getting average rank)

vortex genie 2:
  shape:
    type: rect
    width: 100
    height: 140
    location: center
  yolo_class: "Vortex Genie 2"
  confidence: 0.1
  pick_type: ranked

rack hole:
  shape:
    type: circle
    diameter: 28
    location: center
  yolo_class: "4 way rack 50ml hole"
  confidence: 0.25
  pick_type: toolhead_close

14ml tube:
  shape:
    type: circle
    diameter: 18
    location: center
  yolo_class: "14ml round bottom tube top"
  confidence: 0.1
  pick_type: toolhead_close


14ml rack hole:
  shape:
    type: square
    side: 20
    location: center
  yolo_class: "14ml rack hole"
  confidence: 0.25
  pick_type: toolhead_close


vision_models:
  - eppendorf:
      weights: robot-segmentation.pt
      classes: [50ml eppendorf, 50ml eppendorf cap top, 50ml eppendorf orange cap top, 50ml eppendorf blue cap top, 50ml eppendorf orange cap, 50ml eppendorf blue cap, vortex genie hole, vortex genie 2, 14ml tube, 14ml rack hole, rack hole]
  # - 14ml tube:
  #     weights: segment14ml.pt
  #     classes: [14ml tube, 14ml rack hole, vortex genie hole]
