# Turn off the vortexer by pressing the off-switch with the left arm.
args: {}

protocol:
  - step: grip
    state: 850
    arm: left
    description: Open gripper wide

  - step: go_to
    location: miniprep_switch_position
    arm: left
    description: Move to switch area

  - step: go_to
    location: miniprep_switch_position_close_off
    arm: left
    description: Move to off-switch press position

  - step: grip
    state: 300
    arm: left
    description: Press off-switch

  - step: sleep
    seconds: 0.5

  - step: grip
    state: 850
    arm: left
    description: Release switch

  - step: go_to
    location: miniprep_switch_position
    arm: left
    description: Retract from switch

  - step: go_to
    location: miniprep_left_home
    arm: left
    description: Return left arm home
