brief: "Open 1.5ml eppendorf tubes in the transformation rack."

protocol:
  - step: go_to
    description: "Move left arm to transformation home pose"
    arm: left
    location: trans_home
  - step: go_to
    description: "Move right arm to transformation home pose"
    arm: right
    location: trans_home
  - step: grip
    description: "Open left arm gripper to 400"
    arm: left
    state: 400
  - step: grip
    description: "Open right arm gripper to 400"
    arm: right
    state: 400
  - step: go_to
    description: "Move right arm away from tube rack"
    arm: right
    location: trans_right_1.5_pickup_handoff_move_away

  - step: grip
    description: "Close left arm gripper to 270"
    arm: left
    state: 270
  - step: go_to
    description: "Move to trans left 1.5ml eppendorf tube pickup 1"
    arm: left
    location: trans_left_1.5_pickup_1
  - step: go_to
    description: "Move to trans left 1.5ml eppendorf tube pickup 2"
    arm: left
    location: trans_left_1.5_pickup_2
    offset: [0, 0, -0.5]
  - step: z_level
    description: "Move left arm down to Z level 67.5"
    arm: left
    height: 67.5
  - step: grip
    description: "Close left arm gripper to 160"
    arm: left
    state: 160
  - step: z_level
    description: "Move left arm up to Z level 200"
    arm: left
    height: 200
  - step: go_to
    description: "Move left arm tube to cap handoff position"
    arm: left
    location: trans_left_1.5_pickup_handoff
  - step: go_to
    description: "Move right arm to cap handoff position"
    arm: right
    location: trans_right_1.5_pickup_handoff_2
  - step: grip
    description: "Close right arm gripper to 55"
    arm: right
    state: 55
  - step: grip
    description: "Close left arm gripper to 135"
    arm: left
    state: 135
  - step: move
    description: "Move left arm relative in tool frame ([0, 0, -6, 18, 0, 0])"
    arm: left
    relative: [0, 0, -6, 18, 0, 0]
  - step: grip
    description: "Open left arm gripper to 350"
    arm: left
    state: 350
  - step: move
    description: "Move left arm relative in tool frame ([0, 0, 6, -18, 0, 0])"
    arm: left
    relative: [0, 0, 6, -18, 0, 0]
  - step: grip
    description: "Close left arm gripper to 130"
    arm: left
    state: 130
  - step: grip
    description: "Open right arm gripper to 300"
    arm: right
    state: 300
  - step: go_to
    description: "Move right arm to cap handoff position"
    arm: right
    location: trans_right_1.5_pickup_handoff_2
    offset: [0, 0, -20]
  - step: go_to
    description: "Move right arm away from tube rack"
    arm: right
    location: trans_right_1.5_pickup_handoff_move_away
  - step: go_to
    description: "Move to trans left 1.5ml eppendorf tube pickup 2"
    arm: left
    location: trans_left_1.5_pickup_2
    offset: [0, 0, 60]
  - step: go_to
    description: "Move to trans left 1.5ml eppendorf tube pickup 2"
